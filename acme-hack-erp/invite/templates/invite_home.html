{% extends "layout.html" %}

{% block content %}
<div class="card">
    <h1>IntraCorp Partner Onboarding Portal</h1>
    <p style="margin-bottom:16px; color:#9ca3af;">
        Use a valid invite code to initiate partner onboarding.
    </p>

    <form method="POST" action="/" style="max-width:320px; display:flex; flex-direction:column; gap:10px;">
        <label for="invite_code" style="font-size:13px; color:#e5e7eb;">Invite Code</label>
        <input id="invite_code" name="invite_code" type="text" required
               style="padding:8px 10px; border-radius:8px; border:1px solid rgba(148,163,184,0.6); background:rgba(15,23,42,0.9); color:#e5e7eb; font-size:13px;">
        <button type="submit"
                style="padding:8px 12px; border-radius:8px; border:none; background:#6366f1; color:#e5e7eb; font-size:13px; font-weight:600; cursor:pointer;">
            Submit
        </button>
    </form>

    {% if invite_code is not none %}
    <p style="margin-top:12px; font-size:13px; color:#9ca3af;">
        Received code: <code>{{ invite_code }}</code>
    </p>
    {% endif %}
</div>
{% endblock %}
