<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IntraCorp Internal Systems</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #0f172a;
            color: #e5e7eb;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .layout {
            display: grid;
            grid-template-columns: 260px 1fr;
            min-height: calc(100vh - 56px);
        }
        header {
            height: 56px;
            background: #020617;
            border-bottom: 1px solid rgba(148, 163, 184, 0.2);
            display: flex;
            align-items: center;
            padding: 0 24px;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        header span {
            color: #38bdf8;
            margin-right: 8px;
        }
        aside {
            background: #020617;
            border-right: 1px solid rgba(148, 163, 184, 0.2);
            padding: 24px 16px;
        }
        .sidebar-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 24px;
        }
        nav a {
            display: block;
            padding: 10px 12px;
            border-radius: 8px;
            color: #cbd5f5;
            text-decoration: none;
            font-size: 14px;
            margin-bottom: 4px;
            transition: background 0.2s, color 0.2s, transform 0.1s;
        }
        nav a:hover {
            background: rgba(56, 189, 248, 0.08);
            color: #38bdf8;
            transform: translateX(2px);
        }
        nav a.active {
            background: #1d4ed8;
            color: #e5e7eb;
        }
        main {
            padding: 24px 32px;
        }
        footer {
            height: 44px;
            background: #020617;
            border-top: 1px solid rgba(148, 163, 184, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #9ca3af;
        }
        .card {
            background: rgba(15, 23, 42, 0.9);
            border-radius: 12px;
            padding: 20px 24px;
            border: 1px solid rgba(148, 163, 184, 0.2);
            box-shadow: 0 18px 45px rgba(15, 23, 42, 0.65);
        }
        .card h1, .card h2 {
            margin-bottom: 12px;
        }
    </style>
</head>
<body>
    <header>
        <span>◆</span> IntraCorp Internal Systems
    </header>
    <div class="layout">
        <aside>
            <div class="sidebar-title">Navigation</div>
            <nav>
                <a href="http://localhost:8091">Dashboard</a>
                <a href="http://localhost:8092">Documents</a>
                <a href="http://localhost:8093">Network Tools</a>
                <a href="http://localhost:8094">Billing</a>
                <a href="http://localhost:8095">Partner Access</a>
                <a href="http://localhost:8091/ticket">Support</a>
                <a href="#">System Logs</a>
            </nav>
        </aside>
        <main>
            {% block content %}{% endblock %}
        </main>
    </div>
    <footer>
        © 2026 IntraCorp IT Department
    </footer>
</body>
</html>
