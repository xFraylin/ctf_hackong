{% extends "layout.html" %}

{% block content %}
<div class="card">
    <h1>IntraCorp Network Diagnostics</h1>
    <p style="margin-bottom:16px; color:#9ca3af;">
        Ping Host tool using the internal diagnostics backend.
    </p>

    <form method="GET" action="/ping" style="display:flex; gap:8px; margin-bottom:16px;">
        <input type="text" name="host" placeholder="e.g. 8.8.8.8" value="{{ host or '' }}"
               style="flex:1; padding:8px 10px; border-radius:8px; border:1px solid rgba(148,163,184,0.6); background:rgba(15,23,42,0.9); color:#e5e7eb; font-size:13px;">
        <button type="submit"
                style="padding:8px 12px; border-radius:8px; border:none; background:#22c55e; color:#022c22; font-size:13px; font-weight:600; cursor:pointer;">
            Run Ping
        </button>
    </form>

    {% if resultado is not none %}
    <div style="border-radius:8px; border:1px solid rgba(148,163,184,0.6); background:rgba(15,23,42,0.9); padding:12px 14px; font-family:monospace; font-size:12px; white-space:pre-wrap;">
{{ resultado }}
    </div>
    {% endif %}
</div>
{% endblock %}
